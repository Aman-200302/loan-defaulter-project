name: ML Training & Evaluation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  train-and-report:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dvc dvc-http optuna
          pip install dvc dvc-http

          pip install pandas numpy scikit-learn \
                      xgboost mlflow \
                      joblib matplotlib pyarrow \
                      feast setuptools

      # 4. Configure DagsHub authentication
      - name: Configure DVC remote
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user "$DAGSHUB_USERNAME"
          dvc remote modify origin --local password "$DAGSHUB_TOKEN"

      # 5. Pull data from DagsHub
      - name: Pull data
        run: |
          dvc pull -r origin

      # 6. Train and evaluate model
      - name: Train model
        env:
          MLFLOW_ALLOW_FILE_STORE: "true"
        run: |
          python src/train_eval.py

      # 7. Upload reports
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/

      # 8. Upload trained model
      - name: Upload model
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/

      # 9. Publish metrics in workflow summary
      - name: Training Summary
        run: |
          echo "## 🏦 Loan Default Prediction Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Metrics" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat reports/metrics.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated Files" >> $GITHUB_STEP_SUMMARY
          echo "- models/model.pkl" >> $GITHUB_STEP_SUMMARY
          echo "- reports/metrics.json" >> $GITHUB_STEP_SUMMARY
          echo "- reports/confusion_matrix.png" >> $GITHUB_STEP_SUMMARY