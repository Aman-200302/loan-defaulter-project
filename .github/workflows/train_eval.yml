
name: ML Training & Evaluation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  train-and-report:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out code
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. Install dependencies      
      - name: Install dependencies
        run: |
          pip install dvc dvc-http
          pip install pandas numpy scikit-learn xgboost mlflow \
                      joblib matplotlib pyarrow feast setuptools

      # 4. Download data + preprocess
      - name: Pull data with DVC
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user $DAGSHUB_USERNAME
          dvc remote modify origin --local password $DAGSHUB_TOKEN
          dvc pull -r origin

      # 5. Train and evaluate model
      - name: Train and evaluate
        run: python src/train_eval.py

      - name: Publish metrics report
        uses: iterative/cml@v3
        with:
          cmd: |
            echo "## 🏦 Loan Default Model — Training Report" > report.md
            echo "" >> report.md
            echo "### Metrics" >> report.md
            echo '```json' >> report.md
            cat reports/metrics.json >> report.md
            echo '```' >> report.md
            echo "" >> report.md
            echo "### Confusion Matrix" >> report.md
            echo "![Confusion Matrix](reports/confusion_matrix.png)" >> report.md
            echo "" >> report.md
            echo "*Triggered by commit: ${{ github.sha }}*" >> report.md
            cml comment create report.md
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}